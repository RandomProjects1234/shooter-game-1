<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Top-Down Shooter</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        #gameCanvas { display: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10; }
        .panel { background: #333; padding: 20px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%; }
        input, button { padding: 10px; margin: 10px 0; width: 100%; box-sizing: border-box; font-size: 16px; border-radius: 5px; border: none; }
        button { background: #4CAF50; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        #character-selection { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .char-img { width: 50px; height: 50px; cursor: pointer; border: 3px solid transparent; border-radius: 5px; }
        .char-img.selected { border-color: #4CAF50; background: rgba(76, 175, 80, 0.3); }
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; display: none; z-index: 5; }
        #game-info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; display: none; z-index: 5; pointer-events: none; }
        #mobile-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; display: none; z-index: 5; pointer-events: none; }
        .touch-zone { position: absolute; top: 0; height: 100%; width: 50%; pointer-events: auto; }
        #left-zone { left: 0; } #right-zone { right: 0; }
        .joystick { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.2); transform: translate(-50%, -50%); display: none; pointer-events: none;}
        .knob { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.5); transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h2>Setup Game</h2>
            <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
            
            <p>Select Character:</p>
            <div id="character-selection">
                <img src="player 1.png" class="char-img selected" data-src="player 1.png">
                <img src="player 2.png" class="char-img" data-src="player 2.png">
                <img src="player 3.png" class="char-img" data-src="player 3.png">
                <img src="player 4.png" class="char-img" data-src="player 4.png">
                <img src="player 6.png" class="char-img" data-src="player 6.png">
                <img src="player real4.png" class="char-img" data-src="player real4.png">
            </div>

            <hr style="border-color:#555">
            <h3>Host a New Game</h3>
            <button id="btnHost">Create Game</button>
            <div id="hostIdDisplay" style="display:none; color:#4CAF50; margin-top:10px; font-weight:bold;"></div>

            <hr style="border-color:#555">
            <h3>Join Existing Game</h3>
            <input type="text" id="joinId" placeholder="Paste Host ID here">
            <button id="btnJoin" style="background:#2196F3;">Join Game</button>
            <p id="statusMsg" style="color: yellow;"></p>
        </div>
    </div>

    <div id="leaderboard">
        <h3 style="margin:0 0 10px 0; border-bottom:1px solid #fff; padding-bottom:5px;">Wins</h3>
        <div id="leaderboard-list"></div>
    </div>

    <div id="game-info">
        <div id="lives-display" style="font-size: 20px; font-weight: bold; color: #ff4444;">Lives: 3</div>
        <div id="round-display">Map: 1</div>
    </div>

    <div id="mobile-controls">
        <div id="left-zone" class="touch-zone">
            <div id="joy-move" class="joystick"><div class="knob"></div></div>
        </div>
        <div id="right-zone" class="touch-zone">
            <div id="joy-shoot" class="joystick"><div class="knob"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- Asset Setup ---
const imageSources = ['player 1.png', 'player 2.png', 'player 3.png', 'player 4.png', 'player 6.png', 'player real4.png', 'bullet.png'];
const images = {};
imageSources.forEach(src => {
    images[src] = new Image();
    images[src].src = src;
});

// --- UI Logic ---
let selectedChar = 'player 1.png';
document.querySelectorAll('.char-img').forEach(img => {
    img.addEventListener('click', (e) => {
        document.querySelectorAll('.char-img').forEach(i => i.classList.remove('selected'));
        e.target.classList.add('selected');
        selectedChar = e.target.getAttribute('data-src');
    });
});

// --- Maps (3 Randomized Maps) ---
const maps = [
    { name: "Open Arena", w: 1500, h: 1500, walls: [ {x: 500, y: 500, w: 100, h: 500}, {x: 900, y: 500, w: 100, h: 500} ] },
    { name: "Crossroads", w: 1500, h: 1500, walls: [ {x: 300, y: 700, w: 900, h: 100}, {x: 700, y: 300, w: 100, h: 900} ] },
    { name: "Block City", w: 1500, h: 1500, walls: [ {x: 300, y: 300, w: 200, h: 200}, {x: 1000, y: 300, w: 200, h: 200}, {x: 300, y: 1000, w: 200, h: 200}, {x: 1000, y: 1000, w: 200, h: 200} ] }
];

// --- Game State ---
let isHost = false;
let peer = null;
let connections = []; // For host to track clients
let hostConnection = null; // For client to track host

let myId = null;
let gameState = {
    players: {}, // id -> {x, y, name, img, lives, wins, isDead}
    bullets: [], // {x, y, vx, vy, ownerId}
    mapIndex: 0
};

// --- Physics Constants ---
const PLAYER_SIZE = 50;
const PLAYER_SPEED = 5;
const BULLET_SIZE = 20; // Smaller than player, not too small
const BULLET_SPEED = 15;
const FIRE_RATE_MS = 250;

// --- Input Handling ---
const keys = { w: false, a: false, s: false, d: false };
let mouseX = 0, mouseY = 0, isShooting = false;
let lastFire = 0;

// Mobile joystick data
const joyMove = { active: false, id: null, originX: 0, originY: 0, dx: 0, dy: 0 };
const joyShoot = { active: false, id: null, originX: 0, originY: 0, dirX: 0, dirY: 0 };

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// --- Initialization ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function startGame(role) {
    const name = document.getElementById('playerName').value || "Player";
    document.getElementById('ui').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('leaderboard').style.display = 'block';
    document.getElementById('game-info').style.display = 'block';
    
    if (isMobile) {
        document.getElementById('mobile-controls').style.display = 'block';
        setupMobileControls();
    } else {
        setupDesktopControls();
    }

    resize();
    window.addEventListener('resize', resize);

    // Init my player locally
    gameState.players[myId] = {
        x: Math.random() * 1000 + 200, y: Math.random() * 1000 + 200, 
        name: name, img: selectedChar, lives: 3, wins: 0, isDead: false
    };

    if (role === 'host') {
        gameState.mapIndex = Math.floor(Math.random() * maps.length);
        setInterval(hostGameLoop, 1000/60); // 60 FPS Logic update
    }

    requestAnimationFrame(renderLoop);
}

// --- Networking (PeerJS) ---
document.getElementById('btnHost').addEventListener('click', () => {
    document.getElementById('statusMsg').innerText = "Initializing Host...";
    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        isHost = true;
        document.getElementById('hostIdDisplay').style.display = 'block';
        document.getElementById('hostIdDisplay').innerText = `Share this ID: ${id}`;
        document.getElementById('btnHost').style.display = 'none';
        
        // Wait 3 seconds then start game so they can copy ID
        setTimeout(() => startGame('host'), 3000);
    });

    peer.on('connection', conn => {
        connections.push(conn);
        conn.on('data', data => {
            if(data.type === 'join') {
                gameState.players[conn.peer] = data.playerInfo;
            } else if (data.type === 'input') {
                // Update client input on host
                if(gameState.players[conn.peer]) {
                    gameState.players[conn.peer].x = data.x;
                    gameState.players[conn.peer].y = data.y;
                }
                if(data.shoot) spawnBullet(conn.peer, data.shoot.dirX, data.shoot.dirY);
            }
        });
        conn.on('close', () => { delete gameState.players[conn.peer]; });
    });
});

document.getElementById('btnJoin').addEventListener('click', () => {
    const hostId = document.getElementById('joinId').value.trim();
    if(!hostId) return alert("Enter Host ID");
    document.getElementById('statusMsg').innerText = "Connecting...";
    
    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        hostConnection = peer.connect(hostId);
        
        hostConnection.on('open', () => {
            const name = document.getElementById('playerName').value || "Player";
            hostConnection.send({ type: 'join', playerInfo: { x: Math.random() * 1000 + 200, y: Math.random() * 1000 + 200, name: name, img: selectedChar, lives: 3, wins: 0, isDead: false } });
            startGame('client');
        });

        hostConnection.on('data', data => {
            if(data.type === 'state') {
                // Sync state from host
                const myOldState = gameState.players[myId]; 
                gameState = data.state;
                // Preserve local position prediction to avoid stutter, but trust host on lives/stats
                if(gameState.players[myId] && myOldState) {
                    gameState.players[myId].x = myOldState.x;
                    gameState.players[myId].y = myOldState.y;
                }
                updateUI();
            }
        });
    });
});

// --- Core Game Logic (Host Only) ---
function hostGameLoop() {
    // 1. Move Bullets
    for (let i = gameState.bullets.length - 1; i >= 0; i--) {
        let b = gameState.bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        
        // Wall collision for bullets
        const map = maps[gameState.mapIndex];
        let hitWall = b.x < 0 || b.x > map.w || b.y < 0 || b.y > map.h;
        for(let w of map.walls) {
            if (AABB(b.x, b.y, BULLET_SIZE, BULLET_SIZE, w.x, w.y, w.w, w.h)) hitWall = true;
        }

        if (hitWall) {
            gameState.bullets.splice(i, 1);
            continue;
        }

        // Player collision
        for (let pId in gameState.players) {
            let p = gameState.players[pId];
            if (pId !== b.ownerId && !p.isDead) {
                if (AABB(b.x, b.y, BULLET_SIZE, BULLET_SIZE, p.x, p.y, PLAYER_SIZE, PLAYER_SIZE)) {
                    p.lives--;
                    gameState.bullets.splice(i, 1);
                    if (p.lives <= 0) {
                        p.isDead = true;
                        if(gameState.players[b.ownerId]) gameState.players[b.ownerId].wins++;
                        // Check if round over (only 1 player left out of multiple)
                        checkRoundOver();
                    }
                    break; 
                }
            }
        }
    }

    // Broadcast state to clients
    const stateToSend = JSON.parse(JSON.stringify(gameState)); // Deep copy to avoid reference issues
    connections.forEach(conn => {
        if(conn.open) conn.send({ type: 'state', state: stateToSend });
    });
    updateUI();
}

function checkRoundOver() {
    let aliveCount = 0;
    for(let id in gameState.players) { if(!gameState.players[id].isDead) aliveCount++; }
    
    // If everyone is dead, or only 1 left (and there were multiple), restart round
    if (aliveCount <= 1 && Object.keys(gameState.players).length > 1) {
        setTimeout(resetRound, 3000);
    } else if (aliveCount === 0) {
        setTimeout(resetRound, 1000);
    }
}

function resetRound() {
    gameState.mapIndex = Math.floor(Math.random() * maps.length);
    gameState.bullets = [];
    for(let id in gameState.players) {
        gameState.players[id].lives = 3;
        gameState.players[id].isDead = false;
        gameState.players[id].x = Math.random() * 800 + 200;
        gameState.players[id].y = Math.random() * 800 + 200;
    }
}

function spawnBullet(ownerId, dirX, dirY) {
    let p = gameState.players[ownerId];
    if(!p || p.isDead) return;
    
    let length = Math.sqrt(dirX*dirX + dirY*dirY) || 1;
    let vx = (dirX / length) * BULLET_SPEED;
    let vy = (dirY / length) * BULLET_SPEED;
    
    gameState.bullets.push({
        x: p.x + PLAYER_SIZE/2 - BULLET_SIZE/2,
        y: p.y + PLAYER_SIZE/2 - BULLET_SIZE/2,
        vx: vx, vy: vy, ownerId: ownerId
    });
}

// --- Player Movement & Input (Both Host and Client) ---
function handleLocalInput() {
    let me = gameState.players[myId];
    if (!me || me.isDead) return;

    let dx = 0, dy = 0;

    if(isMobile) {
        dx = joyMove.dx * PLAYER_SPEED;
        dy = joyMove.dy * PLAYER_SPEED;
    } else {
        if (keys.w) dy -= PLAYER_SPEED;
        if (keys.s) dy += PLAYER_SPEED;
        if (keys.a) dx -= PLAYER_SPEED;
        if (keys.d) dx += PLAYER_SPEED;
    }

    // Collision with walls
    let nextX = me.x + dx;
    let nextY = me.y + dy;
    const map = maps[gameState.mapIndex];

    // Map bounds
    if(nextX < 0) nextX = 0;
    if(nextX > map.w - PLAYER_SIZE) nextX = map.w - PLAYER_SIZE;
    if(nextY < 0) nextY = 0;
    if(nextY > map.h - PLAYER_SIZE) nextY = map.h - PLAYER_SIZE;

    // Internal walls
    for(let w of map.walls) {
        if (AABB(nextX, me.y, PLAYER_SIZE, PLAYER_SIZE, w.x, w.y, w.w, w.h)) nextX = me.x;
        if (AABB(me.x, nextY, PLAYER_SIZE, PLAYER_SIZE, w.x, w.y, w.w, w.h)) nextY = me.y;
    }

    me.x = nextX;
    me.y = nextY;

    // Shooting
    let shotData = null;
    let now = Date.now();
    if (now - lastFire > FIRE_RATE_MS) {
        if (isMobile && joyShoot.active) {
            shotData = { dirX: joyShoot.dirX, dirY: joyShoot.dirY };
            lastFire = now;
        } else if (!isMobile && isShooting) {
            let screenCenterX = canvas.width / 2;
            let screenCenterY = canvas.height / 2;
            shotData = { dirX: mouseX - screenCenterX, dirY: mouseY - screenCenterY };
            lastFire = now;
        }
    }

    // If host, process shot locally. If client, send input to host.
    if(shotData && isHost) spawnBullet(myId, shotData.dirX, shotData.dirY);
    
    if(!isHost && hostConnection && hostConnection.open) {
        hostConnection.send({ type: 'input', x: me.x, y: me.y, shoot: shotData });
    }
}

// --- Rendering Loop ---
function renderLoop() {
    handleLocalInput();

    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let me = gameState.players[myId];
    if (!me) { requestAnimationFrame(renderLoop); return; }

    const map = maps[gameState.mapIndex];

    ctx.save();
    // Camera follow
    ctx.translate(Math.floor(-me.x + canvas.width / 2 - PLAYER_SIZE/2), Math.floor(-me.y + canvas.height / 2 - PLAYER_SIZE/2));

    // Draw map bounds
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 5;
    ctx.strokeRect(0, 0, map.w, map.h);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, map.w, map.h);

    // Draw walls
    ctx.fillStyle = '#555';
    for(let w of map.walls) {
        ctx.fillRect(w.x, w.y, w.w, w.h);
    }

    // Draw Players
    for (let id in gameState.players) {
        let p = gameState.players[id];
        if (p.isDead) continue;
        
        let img = images[p.img];
        if(img.complete) {
            ctx.drawImage(img, p.x, p.y, PLAYER_SIZE, PLAYER_SIZE);
        } else {
            ctx.fillStyle = 'red';
            ctx.fillRect(p.x, p.y, PLAYER_SIZE, PLAYER_SIZE);
        }

        // Draw Nameplate
        ctx.fillStyle = 'white';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, p.x + PLAYER_SIZE/2, p.y - 10);
        
        // Draw HP bar
        ctx.fillStyle = 'red';
        ctx.fillRect(p.x, p.y - 5, PLAYER_SIZE, 5);
        ctx.fillStyle = 'green';
        ctx.fillRect(p.x, p.y - 5, (PLAYER_SIZE/3) * p.lives, 5);
    }

    // Draw Bullets
    let bImg = images['bullet.png'];
    for (let b of gameState.bullets) {
        if(bImg.complete) {
            ctx.drawImage(bImg, b.x, b.y, BULLET_SIZE, BULLET_SIZE);
        } else {
            ctx.fillStyle = 'yellow';
            ctx.fillRect(b.x, b.y, BULLET_SIZE, BULLET_SIZE);
        }
    }

    ctx.restore();
    requestAnimationFrame(renderLoop);
}

// --- Utilities & Listeners ---
function AABB(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function updateUI() {
    let me = gameState.players[myId];
    if(me) {
        document.getElementById('lives-display').innerText = `Lives: ${me.lives}`;
        document.getElementById('round-display').innerText = `Map: ${maps[gameState.mapIndex].name}`;
    }

    // Leaderboard
    let sorted = Object.values(gameState.players).sort((a,b) => b.wins - a.wins);
    let lbHtml = "";
    sorted.forEach((p, index) => {
        lbHtml += `<div>${index+1}. ${p.name}: ${p.wins} wins</div>`;
    });
    document.getElementById('leaderboard-list').innerHTML = lbHtml;
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function setupDesktopControls() {
    window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mousedown', e => isShooting = true);
    window.addEventListener('mouseup', e => isShooting = false);
}

function setupMobileControls() {
    const leftZ = document.getElementById('left-zone');
    const rightZ = document.getElementById('right-zone');
    const jMoveUI = document.getElementById('joy-move');
    const jShootUI = document.getElementById('joy-shoot');

    function handleTouchStart(e, isLeft) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const ui = isLeft ? jMoveUI : jShootUI;
        const state = isLeft ? joyMove : joyShoot;
        
        state.active = true;
        state.id = touch.identifier;
        state.originX = touch.clientX;
        state.originY = touch.clientY;
        
        ui.style.display = 'block';
        ui.style.left = touch.clientX + 'px';
        ui.style.top = touch.clientY + 'px';
        ui.children[0].style.transform = `translate(-50%, -50%)`;
    }

    function handleTouchMove(e, isLeft) {
        e.preventDefault();
        const state = isLeft ? joyMove : joyShoot;
        const ui = isLeft ? jMoveUI : jShootUI;
        
        for(let i=0; i<e.changedTouches.length; i++) {
            let touch = e.changedTouches[i];
            if(touch.identifier === state.id) {
                let dx = touch.clientX - state.originX;
                let dy = touch.clientY - state.originY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let maxDist = 50;
                
                if (dist > maxDist) {
                    dx = (dx/dist) * maxDist;
                    dy = (dy/dist) * maxDist;
                }
                
                ui.children[0].style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                if(isLeft) {
                    state.dx = dx / maxDist;
                    state.dy = dy / maxDist;
                } else {
                    state.dirX = dx;
                    state.dirY = dy;
                }
            }
        }
    }

    function handleTouchEnd(e, isLeft) {
        e.preventDefault();
        const state = isLeft ? joyMove : joyShoot;
        const ui = isLeft ? jMoveUI : jShootUI;
        for(let i=0; i<e.changedTouches.length; i++) {
            if(e.changedTouches[i].identifier === state.id) {
                state.active = false;
                state.id = null;
                if(isLeft) { state.dx = 0; state.dy = 0; }
                ui.style.display = 'none';
            }
        }
    }

    leftZ.addEventListener('touchstart', e => handleTouchStart(e, true), {passive:false});
    leftZ.addEventListener('touchmove', e => handleTouchMove(e, true), {passive:false});
    leftZ.addEventListener('touchend', e => handleTouchEnd(e, true), {passive:false});

    rightZ.addEventListener('touchstart', e => handleTouchStart(e, false), {passive:false});
    rightZ.addEventListener('touchmove', e => handleTouchMove(e, false), {passive:false});
    rightZ.addEventListener('touchend', e => handleTouchEnd(e, false), {passive:false});
}
</script>
</body>
</html>
